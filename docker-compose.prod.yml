# 生产环境 Docker Compose 配置
# 使用方式: docker compose -f docker-compose.prod.yml up -d

services:
  fuel-record:
    build:
      context: .
      dockerfile: Dockerfile
    image: fuel-record:latest
    container_name: fuel-record
    restart: unless-stopped
    ports:
      - "80:80"
    # LinuxServer.io 规范的绑定挂载
    volumes:
      # 配置目录（如需自定义配置可挂载，当前通过环境变量配置）
      # - ./config:/config
      # 数据目录（SQLite 数据库）
      - ./data:/data
    env_file:
      - .env
    environment:
      # 生产环境数据库路径（指向 /data）
      - DATABASE_URL=sqlite+aiosqlite:////data/fuel.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 日志配置（防止日志文件膨胀）
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
