# 开发环境 Docker Compose 配置
# 生产环境请使用 docker-compose.prod.yml

services:
  # 前端开发服务（Vite 热重载）
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    command: pnpm dev --host
    develop:
      watch:
        - action: sync
          path: ./client/src
          target: /app/src
          ignore:
            - node_modules/

  # 后端开发服务（FastAPI 热重载）
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    volumes:
      - ./server:/app
      - server-data:/app/data
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/fuel.db
      - DEBUG=true
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    develop:
      watch:
        - action: sync
          path: ./server
          target: /app
          ignore:
            - __pycache__
            - .pyc
            - fuel.db

volumes:
  server-data:
